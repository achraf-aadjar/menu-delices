<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Menu - Menu Délices</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100dvh; overflow: hidden; background: #1a1a1a; }

    #loader {
      position: fixed;
      inset: 0;
      background: #1a1a1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      transition: opacity 0.5s ease;
    }
    #loader.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .logo-text {
      color: #d4a843;
      font-family: Georgia, serif;
      font-size: 2rem;
      letter-spacing: 0.1em;
      margin-bottom: 0.3rem;
    }
    .sub-text {
      color: #888;
      font-family: Georgia, serif;
      font-size: 0.9rem;
      letter-spacing: 0.2em;
      margin-bottom: 2.5rem;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #333;
      border-top-color: #d4a843;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    .loading-label {
      color: #555;
      font-family: Arial, sans-serif;
      font-size: 0.75rem;
      margin-top: 1rem;
      letter-spacing: 0.1em;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    iframe {
      width: 100%;
      height: 100dvh;
      border: none;
      display: block;
      background: #fff;
    }
  </style>
</head>
<body>

  <div id="loader">
    <div class="logo-text">Menu Délices</div>
    <div class="sub-text">RESTAURANT</div>
    <div class="spinner"></div>
    <div class="loading-label">Chargement du menu...</div>
  </div>

  <iframe
    id="pdfFrame"
    src="menu-delice.pdf"
    onload="hideLoader()"
    onerror="hideLoader()"
    title="Menu Délices"
  ></iframe>

  <script>
    function hideLoader() {
      document.getElementById('loader').classList.add('hidden');
    }

    // Fallback : masque le loader après 8 secondes même si l'iframe ne déclenche pas onload
    setTimeout(hideLoader, 8000);

    // Sur iOS Safari, l'iframe PDF peut ne pas déclencher onload — on redirige directement
    var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
    if (isIOS) {
      window.location.href = 'menu-delice.pdf';
    }
  </script>

</body>
</html>
